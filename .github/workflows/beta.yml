name: Bêta (étapes 2025)

# Piloter des essais avec de vraies étapes passées (ex. Tour 2025), en 3 états :
#   - open    : 1) PARIS OUVERTS (vraies côtes), étape affichée comme "du jour"
#   - close   : 2) PARIS FERMÉS, course en cours (pas encore de résultats)
#   - results : 3) CLASSEMENT SORTI (vrais résultats -> scoring)
#   - reset   : repart d'une base propre (garde les comptes)
on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        type: choice
        options: [open, close, results, reset]
        required: true
      stage:
        description: "N° d'étape (open / close / results)"
        required: false
        default: ''
      season:
        description: "Saison des données réelles"
        required: false
        default: '2025'
      hours:
        description: "Durée d'ouverture des paris en heures (open)"
        required: false
        default: '48'

jobs:
  beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --no-cache-dir -r jobs/requirements.txt
      - name: Pilotage bêta
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MPV_RACE_SLUG: ${{ vars.MPV_RACE_SLUG }}
          MPV_ODDS_MAX: ${{ vars.MPV_ODDS_MAX }}
          MPV_ODDS_ALPHA: ${{ vars.MPV_ODDS_ALPHA }}
        run: |
          S="--season ${{ github.event.inputs.season }} --stage ${{ github.event.inputs.stage }}"
          case "${{ github.event.inputs.action }}" in
            open)    python beta.py open  $S --hours ${{ github.event.inputs.hours }} ;;
            close)   python beta.py close   $S ;;
            results) python beta.py results $S ;;
            reset)   python beta.py reset ;;
            *) echo "Action inconnue"; exit 1 ;;
          esac
