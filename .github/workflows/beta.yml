name: Bêta (étapes 2025)

# Piloter des essais avec de vraies étapes passées (ex. Tour 2025), en 3 états :
#   - open    : 1) PARIS OUVERTS (vraies côtes), étape affichée comme "du jour"
#   - close   : 2) PARIS FERMÉS, course en cours (pas encore de résultats)
#   - results : 3) CLASSEMENT SORTI (vrais résultats -> scoring)
#   - reset   : repart d'une base propre (garde les comptes)
on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        type: choice
        options: [open, close, results, reset]
        required: true
      stage:
        description: "N° d'étape (open / close / results)"
        required: false
        default: ''
      season:
        description: "Saison des données réelles"
        required: false
        default: '2025'
      hours:
        description: "Durée d'ouverture des paris en heures (open)"
        required: false
        default: '48'

jobs:
  beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --no-cache-dir -r jobs/requirements.txt
      - name: Démarrer FlareSolverr (contournement Cloudflare PCS)
        run: |
          # Version ÉPINGLÉE : le tag :latest a été repoussé en 3.5.0 (Chromium
          # 148) qui ne résout plus le défi Cloudflare de PCS (timeout 90 s).
          # v3.3.21 = dernier release stable qui passait jusqu'au 2026-07-06.
          docker run -d --name flaresolverr --shm-size=2g -p 8191:8191 \
            ghcr.io/flaresolverr/flaresolverr:v3.3.21
          for i in $(seq 1 40); do
            curl -s http://localhost:8191/ | grep -qi "ready" && { echo "FlareSolverr prêt"; break; } || sleep 3
          done
          # Vérifie que le Chrome interne RÉSOUT vraiment PCS (un 500 ici = Chrome
          # planté, souvent /dev/shm — d'où --shm-size=2g ci-dessus).
          code=0
          for i in $(seq 1 5); do
            code=$(curl -s -o /tmp/fs.json -w '%{http_code}' -X POST http://localhost:8191/v1 \
              -H 'Content-Type: application/json' \
              -d '{"cmd":"request.get","url":"https://www.procyclingstats.com/","maxTimeout":90000}')
            [ "$code" = "200" ] && { echo "FlareSolverr résout OK (HTTP 200)"; break; }
            echo "warm-up FlareSolverr tentative $i : HTTP $code"; sleep 5
          done
          if [ "$code" != "200" ]; then
            echo "::error::FlareSolverr ne résout pas PCS (HTTP $code). Logs conteneur :"
            docker logs --tail 100 flaresolverr || true
            exit 1
          fi
      - name: Pilotage bêta
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MPV_RACE_SLUG: ${{ vars.MPV_RACE_SLUG }}
          MPV_ODDS_MAX: ${{ vars.MPV_ODDS_MAX }}
          MPV_ODDS_ALPHA: ${{ vars.MPV_ODDS_ALPHA }}
          MPV_ODDS_FORM_BONUS: ${{ vars.MPV_ODDS_FORM_BONUS }}
          MPV_ODDS_FORM_TAU_DAYS: ${{ vars.MPV_ODDS_FORM_TAU_DAYS }}
          MPV_FLARESOLVERR_URL: http://localhost:8191/v1
          # Notifications push déclenchées par beta.py (open/close/results).
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ vars.VAPID_SUBJECT }}
          MPV_SITE_URL: ${{ vars.MPV_SITE_URL }}
        run: |
          S="--season ${{ github.event.inputs.season }} --stage ${{ github.event.inputs.stage }}"
          case "${{ github.event.inputs.action }}" in
            open)    python beta.py open  $S --hours ${{ github.event.inputs.hours }} ;;
            close)   python beta.py close   $S ;;
            results) python beta.py results $S ;;
            reset)   python beta.py reset ;;
            *) echo "Action inconnue"; exit 1 ;;
          esac
