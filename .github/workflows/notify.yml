name: Notifications (rappel + clôture)

# ⏰ cron en UTC. En juillet, Paris = UTC+2 (CEST).
#   Rappel + clôture suivent la VRAIE deadline (= heure de départ de l'étape).
#   Un "tick" tourne toutes les 20 min de 11h à 15h40 Paris (09:00–13:40 UTC) :
#     - rappel dès qu'on entre dans la fenêtre avant la deadline (une fois),
#     - clôture dès que la deadline est passée (une fois).
#   « Étape ouverte » et « résultats » sont déclenchées par les workflows
#   Côtes et Résultats (au moment de la transition).
on:
  schedule:
    - cron: '*/20 9-13 * * *'
  workflow_dispatch:
    inputs:
      event:
        description: "Événement à notifier"
        type: choice
        options: [tick, reminder, close, open, results]
        default: tick

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --no-cache-dir -r jobs/requirements.txt
      - name: Envoi des notifications
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ vars.VAPID_SUBJECT }}
          MPV_SITE_URL: ${{ vars.MPV_SITE_URL }}
          MPV_SEASON: ${{ vars.MPV_SEASON }}
        run: python notify.py --event "${{ github.event.inputs.event || 'tick' }}"
