name: Notifications (rappel + clôture)

# ⏰ cron en UTC. En juillet, Paris = UTC+2 (CEST).
#   Toutes les 20 min de 11h à ~23h40 Paris (09:00–21:40 UTC), on envoie TOUTES
#   les notifs (chacune idempotente via les drapeaux notified_*) :
#     - rappel + clôture : dès la fenêtre / la deadline passée (midi),
#     - étape ouverte + résultats : dès que la donnée est écrite (le soir).
#   NB : la RÉCUPÉRATION des cotes/résultats tourne désormais en local (PCS est
#   bloqué depuis les IP GitHub) ; seul l'ENVOI des notifs reste ici, car il ne
#   lit que Supabase et dispose des clés VAPID.
on:
  schedule:
    - cron: '*/20 9-21 * * *'
  workflow_dispatch:
    inputs:
      event:
        description: "Événement à notifier (test = notif à toi seul)"
        type: choice
        options: [tick, reminder, close, open, results, test]
        default: tick
      email:
        description: "Email cible (uniquement pour event=test)"
        required: false
        default: ''

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # notify.py ne lit que Supabase + envoie du Web Push : install allégée
      # (pas de procyclingstats/cloudscraper) -> job bien plus rapide/réactif.
      - run: pip install --no-cache-dir "requests>=2.31" "pywebpush>=1.14.1"
      - name: Envoi des notifications
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ vars.VAPID_SUBJECT }}
          MPV_SITE_URL: ${{ vars.MPV_SITE_URL }}
          MPV_SEASON: ${{ vars.MPV_SEASON }}
        run: |
          EVENT="${{ github.event.inputs.event }}"
          if [ "$EVENT" = "test" ]; then
            python notify.py --test --email "${{ github.event.inputs.email }}"   # notif à toi seul
          elif [ -n "$EVENT" ]; then
            python notify.py --event "$EVENT"          # déclenchement manuel : 1 seul événement
          else
            # Cron : on couvre tout (idempotent). open/results dès que le local a écrit.
            python notify.py --event tick
            python notify.py --event open
            python notify.py --event results
          fi
