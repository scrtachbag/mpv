name: Notifications (rappel + clôture)

# ⏰ cron en UTC. En juillet, Paris = UTC+2 (CEST).
#   09:30 UTC = 11h30 Paris → rappel (~30 min avant la clôture) aux non-parieurs.
#   10:00 UTC = 12h00 Paris → paris fermés.
# Les notifications « étape ouverte » et « résultats » sont déclenchées par les
# workflows Côtes et Résultats (au moment de la transition).
on:
  schedule:
    - cron: '30 9 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      event:
        description: "Événement à notifier"
        type: choice
        options: [reminder, close, open, results]
        default: reminder

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --no-cache-dir -r jobs/requirements.txt
      - name: Envoi des notifications
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ vars.VAPID_SUBJECT }}
          MPV_SITE_URL: ${{ vars.MPV_SITE_URL }}
          MPV_SEASON: ${{ vars.MPV_SEASON }}
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_EVENT: ${{ github.event.inputs.event }}
        run: |
          EVENT="$INPUT_EVENT"
          if [ -z "$EVENT" ]; then
            case "$SCHEDULE" in
              '30 9 * * *') EVENT=reminder ;;
              '0 10 * * *') EVENT=close ;;
              *) EVENT=reminder ;;
            esac
          fi
          echo "→ notify.py --event $EVENT"
          python notify.py --event "$EVENT"
