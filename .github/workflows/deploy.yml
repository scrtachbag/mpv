name: Déploiement du site (GitHub Pages)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        working-directory: web
        run: npm install

      - name: Build
        working-directory: web
        env:
          # Clés PUBLIQUES (embarquées dans le bundle). Définies dans
          # Settings > Secrets and variables > Actions > Secrets.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Lien (facultatif) vers la page Actions, pour le bouton admin.
          VITE_MPV_ACTIONS_URL: ${{ vars.VITE_MPV_ACTIONS_URL }}
          # Clé VAPID publique (notifications push). Publique -> variable, pas secret.
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - id: deploy
        uses: actions/deploy-pages@v4
