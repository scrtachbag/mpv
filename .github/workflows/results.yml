name: Résultats du soir

# ⏰ cron en UTC. En juillet, Paris = UTC+2 (CEST).
#    Polling toutes les 10 min de 17h à 18h Paris (15h–16h UTC) pour publier le
#    classement dès qu'il sort, puis 2 rattrapages le soir (19h30 et 22h Paris).
#    (Le cron GitHub n'est pas précis à la minute : léger décalage possible.)
on:
  schedule:
    - cron: '*/10 15 * * *'   # 17h00 → 17h50 Paris, toutes les 10 min
    - cron: '0 16 * * *'      # 18h00 Paris
    - cron: '30 17 * * *'     # 19h30 Paris (rattrapage)
    - cron: '0 20 * * *'      # 22h00 Paris (rattrapage)
  workflow_dispatch:
    inputs:
      stage_no:
        description: "Numéro d'étape (vide = étape du jour)"
        required: false
        default: ''

jobs:
  results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --no-cache-dir -r jobs/requirements.txt
      - name: Récupération des résultats et scoring
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MPV_SEASON: ${{ vars.MPV_SEASON }}
          MPV_RACE_SLUG: ${{ vars.MPV_RACE_SLUG }}
          # Contournement Cloudflare via API de scraping (voir pcs.py).
          MPV_SCRAPER_API_URL: ${{ secrets.MPV_SCRAPER_API_URL }}
        run: |
          if [ -n "${{ inputs.stage_no }}" ]; then
            python fetch_results.py --stage "${{ inputs.stage_no }}"
          else
            python fetch_results.py
          fi
      - name: Notif — résultats publiés
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ vars.VAPID_SUBJECT }}
          MPV_SITE_URL: ${{ vars.MPV_SITE_URL }}
        run: python notify.py --event results
