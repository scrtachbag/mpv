name: Résultats du soir

# ⏰ cron en UTC. En juillet, Paris = UTC+2 (CEST).
#    Polling toutes les 10 min de 17h à 18h Paris (15h–16h UTC) pour publier le
#    classement dès qu'il sort, puis 2 rattrapages le soir (19h30 et 22h Paris).
#    (Le cron GitHub n'est pas précis à la minute : léger décalage possible.)
on:
  schedule:
    - cron: '*/10 15 * * *'   # 17h00 → 17h50 Paris, toutes les 10 min
    - cron: '0 16 * * *'      # 18h00 Paris
    - cron: '30 17 * * *'     # 19h30 Paris (rattrapage)
    - cron: '0 20 * * *'      # 22h00 Paris (rattrapage)
  workflow_dispatch:
    inputs:
      stage_no:
        description: "Numéro d'étape (vide = étape du jour)"
        required: false
        default: ''

jobs:
  results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --no-cache-dir -r jobs/requirements.txt
      - name: Démarrer FlareSolverr (contournement Cloudflare PCS)
        run: |
          # Version ÉPINGLÉE : le tag :latest a été repoussé en 3.5.0 (Chromium
          # 148) qui ne résout plus le défi Cloudflare de PCS (timeout 90 s).
          # v3.3.21 = dernier release stable qui passait jusqu'au 2026-07-06.
          docker run -d --name flaresolverr --shm-size=2g -p 8191:8191 \
            ghcr.io/flaresolverr/flaresolverr:v3.3.21
          for i in $(seq 1 40); do
            curl -s http://localhost:8191/ | grep -qi "ready" && { echo "FlareSolverr prêt"; break; } || sleep 3
          done
          # Vérifie que le Chrome interne RÉSOUT vraiment PCS (un 500 ici = Chrome
          # planté, souvent /dev/shm — d'où --shm-size=2g ci-dessus).
          code=0
          for i in $(seq 1 5); do
            code=$(curl -s -o /tmp/fs.json -w '%{http_code}' -X POST http://localhost:8191/v1 \
              -H 'Content-Type: application/json' \
              -d '{"cmd":"request.get","url":"https://www.procyclingstats.com/","maxTimeout":90000}')
            [ "$code" = "200" ] && { echo "FlareSolverr résout OK (HTTP 200)"; break; }
            echo "warm-up FlareSolverr tentative $i : HTTP $code"; sleep 5
          done
          if [ "$code" != "200" ]; then
            echo "::error::FlareSolverr ne résout pas PCS (HTTP $code). Logs conteneur :"
            docker logs --tail 100 flaresolverr || true
            exit 1
          fi
      - name: Récupération des résultats et scoring
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MPV_SEASON: ${{ vars.MPV_SEASON }}
          MPV_RACE_SLUG: ${{ vars.MPV_RACE_SLUG }}
          MPV_FLARESOLVERR_URL: http://localhost:8191/v1
        run: |
          if [ -n "${{ inputs.stage_no }}" ]; then
            python fetch_results.py --stage "${{ inputs.stage_no }}"
          else
            python fetch_results.py
          fi
      - name: Notif — résultats publiés
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ vars.VAPID_SUBJECT }}
          MPV_SITE_URL: ${{ vars.MPV_SITE_URL }}
        run: python notify.py --event results
