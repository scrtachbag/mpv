name: Côtes (veille au soir)

# ⏰ cron en UTC. En juillet, Paris = UTC+2 (CEST).
#    18:00 UTC = 20h00 Paris, la VEILLE de l'étape : on cote l'étape du
#    lendemain (--offset-days 1) en intégrant la forme la plus récente, y
#    compris les résultats des étapes du Tour déjà courues ce jour-là.
#    (La deadline de pari reste midi le jour de l'étape.)
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      offset_days:
        description: "Décalage (1 = étape de demain, 0 = aujourd'hui)"
        required: false
        default: '1'
      season:
        description: "Saison à forcer (vide = variable MPV_SEASON). Ex: 2025 pour tester."
        required: false
        default: ''
      stage:
        description: "Numéro d'étape à forcer (optionnel). Ex: 12"
        required: false
        default: ''
      dry_run:
        description: "Test : calcule et AFFICHE les côtes sans rien écrire en base"
        type: boolean
        required: false
        default: false

jobs:
  odds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --no-cache-dir -r jobs/requirements.txt
      - name: Démarrer FlareSolverr (contournement Cloudflare PCS)
        run: |
          docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
          for i in $(seq 1 40); do
            curl -s http://localhost:8191/ | grep -qi "ready" && { echo "FlareSolverr prêt"; break; } || sleep 3
          done
      - name: Calcul des côtes
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MPV_SEASON: ${{ vars.MPV_SEASON }}
          MPV_RACE_SLUG: ${{ vars.MPV_RACE_SLUG }}
          MPV_ODDS_MAX: ${{ vars.MPV_ODDS_MAX }}
          MPV_ODDS_ALPHA: ${{ vars.MPV_ODDS_ALPHA }}
          MPV_FLARESOLVERR_URL: http://localhost:8191/v1
        run: |
          ARGS="--offset-days ${{ github.event.inputs.offset_days || '1' }}"
          if [ -n "${{ github.event.inputs.season }}" ]; then ARGS="$ARGS --season ${{ github.event.inputs.season }}"; fi
          if [ -n "${{ github.event.inputs.stage }}" ];  then ARGS="$ARGS --stage ${{ github.event.inputs.stage }}"; fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "→ python fetch_odds.py $ARGS"
          python fetch_odds.py $ARGS
