name: Côtes (veille au soir)

# ⏰ cron en UTC. En juillet, Paris = UTC+2 (CEST).
#    18:00 UTC = 20h00 Paris, la VEILLE de l'étape : on cote l'étape du
#    lendemain (--offset-days 1) en intégrant la forme la plus récente, y
#    compris les résultats des étapes du Tour déjà courues ce jour-là.
#    (La deadline de pari reste midi le jour de l'étape.)
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      offset_days:
        description: "Décalage (1 = étape de demain, 0 = aujourd'hui)"
        required: false
        default: '1'

jobs:
  odds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --no-cache-dir -r jobs/requirements.txt
      - name: Calcul et publication des côtes
        working-directory: jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MPV_SEASON: ${{ vars.MPV_SEASON }}
          MPV_RACE_SLUG: ${{ vars.MPV_RACE_SLUG }}
        run: python fetch_odds.py --offset-days ${{ github.event.inputs.offset_days || '1' }}
